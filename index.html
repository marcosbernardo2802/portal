<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Portal Crônicas Estelares.</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- META TAGS -->
    <meta name="description" content="Ferramentas gratuitas para criadores de conteúdo e canais dark.">
    <meta name="author" content="Crônicas Estelares">

    <!-- FAVICON -->
    <link rel="icon" href="https://raw.githubusercontent.com/marcosbernardo2802/portal/main/images/favicon.png" type="image/png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        darkBg: '#131314',
                        darkSurface: '#1e1e20',
                        darkText: '#e3e3e3',
                        darkTextMuted: '#c4c7c5',
                        lightBg: '#ffffff',
                        lightSurface: '#f0f4f9',
                        lightText: '#1f1f1f',
                        lightTextMuted: '#444746',
                        accent: '#00f2fe',
                    }
                }
            }
        }
    </script>
    
    <!-- Fonte Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Variáveis de Tema */
        :root {
            --bg-color: #131314;
            --surface-color: #1e1e20;
            --surface-hover: #282a2c;
            --text-main: #e3e3e3;
            --text-muted: #c4c7c5;
            --border-color: #333537;
        }

        .light-theme {
            --bg-color: #ffffff;
            --surface-color: #f0f4f9;
            --surface-hover: #e1e5ea;
            --text-main: #1f1f1f;
            --text-muted: #444746;
            --border-color: #d1d9e0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
        }

        .bg-surface { background-color: var(--surface-color); transition: background-color 0.3s; }
        .hover-surface:hover { background-color: var(--surface-hover); }
        .border-custom { border-color: var(--border-color); transition: border-color 0.3s; }

        /* Barra de Rolagem Estelar */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 10px;
            border: 2px solid var(--bg-color);
        }

        /* Gestão de ícones do seletor */
        .light-theme #icon-sun { display: none; }
        body:not(.light-theme) #icon-moon { display: none; }

        /* Mobile Sidebar */
        #mobile-overlay.active { display: block; }
        #sidebar.active { transform: translateX(0); }
        @media (min-width: 768px) {
            #sidebar.desktop-collapsed { margin-left: -18rem; }
        }

        /* --- ANIMAÇÃO: ROLAGEM VERTICAL INFINITA DA NEBULOSA --- */
        @keyframes scrollSpaceVertical {
            from { background-position: 0 0; }
            to { background-position: 0 -1000px; } 
        }

        .header-animated-bg {
            position: relative;
            overflow: hidden;
            background: transparent !important;
        }

        .header-animated-bg::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('https://images.pexels.com/photos/1169754/pexels-photo-1169754.jpeg');
            background-size: cover;
            background-repeat: repeat;
            opacity: 0.85; 
            z-index: 0;
            pointer-events: none;
            animation: scrollSpaceVertical 60s linear infinite; 
        }

        /* Mantém brilho e visibilidade */
        .light-theme .header-animated-bg::before {
            opacity: 0.85;
        }

        .light-theme .header-animated-bg .text-white-force,
        .light-theme .header-animated-bg button svg:not(.theme-icon) {
            color: #ffffff !important;
        }
        
        /* Título com Degradê Estelar */
        .title-gradient {
            background-image: linear-gradient(to right, #00f2fe, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.4));
        }
        
        /* Animação de entrada */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="font-sans h-screen flex flex-col overflow-hidden antialiased">

    <!-- CABEÇALHO DA NAVE-MÃE -->
    <header class="header-animated-bg w-full h-14 border-b border-custom flex items-center justify-between px-4 z-50 flex-shrink-0 shadow-lg">
        
        <div class="flex items-center gap-2 relative z-10">
            <button class="p-2 -ml-2 rounded-full hover:bg-white/10 text-white transition-colors" onclick="toggleSidebar()">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <div class="flex items-center gap-3 cursor-pointer ml-1" onclick="renderHome()">
                <img src="https://raw.githubusercontent.com/marcosbernardo2802/portal/main/images/favicon.png" alt="Logo" class="w-7 h-7 rounded-full border border-white/20">
                <span class="font-bold text-base md:text-lg tracking-wide title-gradient">Portal Crônicas Estelares.</span>
            </div>
        </div>
        
        <!-- Alternador de Tema -->
        <button id="theme-toggle" class="relative z-10 p-2 rounded-full bg-black/30 backdrop-blur-md hover:bg-black/50 border border-white/10 transition-transform hover:scale-105">
            <svg id="icon-moon" class="w-4 h-4 text-accent theme-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M21.64,13.14C20.97,13.14 20.3,13.42 19.82,13.9C19.34,14.38 19.06,15.05 19.06,15.72C19.06,16.39 19.34,17.06 19.82,17.54C20.3,18.02 20.97,18.3 21.64,18.3C22.31,18.3 22.98,18.02 23.46,17.54C23.94,17.06 24.22,16.39 24.22,15.72C24.22,15.05 23.94,14.38 23.46,13.9C22.98,13.42 22.31,13.14 21.64,13.14Z M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22C15.93,22 19.33,19.79 20.94,16.63C17.9,17.56 14.62,16.4 12.5,13.82C10.38,11.24 10.45,7.87 12.68,5.3C11.39,4.28 9.81,3.75 8.12,4.05C5.91,4.5 4.05,6.17 3.34,8.36C2.63,10.55 3.19,12.94 4.83,14.57C6.47,16.21 8.85,16.78 11.05,16.07C11.33,16 11.62,15.95 11.9,15.9C11.53,15.33 11.25,14.68 11.09,14C10.23,10.82 11.7,7.5 14.5,5.8C15.45,5.23 16.5,4.96 17.55,5C17.84,2.92 15.15,2 12,2Z"/></svg>
            <svg id="icon-sun" class="w-4 h-4 text-orange-400 theme-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M12,9A3,3 0 0,0 9,12A3,3 0 0,0 12,15A3,3 0 0,0 15,12A3,3 0 0,0 12,9M12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17M12,4.5V2.5H11V4.5H12M18.6,6.5L19.8,5.3L18.4,3.9L17.2,5.1L18.6,6.5M20.5,11H22.5V12H20.5V11M17.2,18.9L18.4,20.1L19.8,18.7L18.6,17.5L17.2,18.9M12,20.5V22.5H13V20.5H12M5.4,17.5L4.2,18.7L2.8,17.3L4,16.1L5.4,17.5M3.5,12H1.5V11H3.5V12M6.8,5.1L5.6,3.9L4.2,5.3L5.4,6.5L6.8,5.1Z"/></svg>
        </button>
    </header>

    <div class="flex-1 flex overflow-hidden relative w-full">
        <!-- Overlay Mobile -->
        <div id="mobile-overlay" class="fixed inset-0 bg-black/60 z-30 hidden md:hidden" onclick="toggleSidebar()"></div>

        <!-- MENU LATERAL -->
        <aside id="sidebar" class="bg-[var(--bg-color)] w-72 flex-shrink-0 h-full flex flex-col fixed md:relative z-40 transform -translate-x-full md:translate-x-0 transition-all duration-300 border-r border-custom pt-4 shadow-2xl">
            <div class="px-4 mb-4">
                <button onclick="renderHome()" class="flex items-center gap-2 bg-surface hover-surface border border-custom px-4 py-3 rounded-xl w-full text-sm font-semibold transition-all">
                    <svg class="w-5 h-5 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Painel da Nave-Mãe
                </button>
            </div>

            <div class="flex-1 overflow-y-auto px-3 space-y-6">
                <div>
                    <p class="px-3 text-[10px] font-bold text-muted uppercase tracking-widest mb-2">Módulos Ativos</p>
                    <nav class="space-y-1" id="tool-list"></nav>
                </div>

                <div>
                    <p class="px-3 text-[10px] font-bold text-muted uppercase tracking-widest mb-2">Comunidade</p>
                    <nav class="space-y-1">
                        <a href="https://www.youtube.com/@CronicasEstelaress" target="_blank" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover-surface text-sm text-muted hover:text-[var(--text-main)] transition-all">
                            <svg class="w-4 h-4 text-red-500" fill="currentColor" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                            YouTube
                        </a>
                        <a href="https://page-doacao.vercel.app/" onclick="handleToolClick(event, 'apoio')" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover-surface text-sm text-muted hover:text-[var(--text-main)] transition-all">
                            <svg class="w-4 h-4 text-accent" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                            Apoio ao Projeto
                        </a>
                        <a href="https://regras-cronicas-estelares.vercel.app" onclick="handleToolClick(event, 'protagonista')" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover-surface text-sm text-muted hover:text-[var(--text-main)] transition-all">
                            <svg class="w-4 h-4 text-yellow-500" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                            Seja um Protagonista
                        </a>
                        <a href="mailto:cronicasestelares.oficial@gmail.com" target="_blank" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover-surface text-sm text-muted hover:text-[var(--text-main)] transition-all">
                            <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                            Contato
                        </a>
                    </nav>
                </div>
            </div>

            <div class="p-4 border-t border-custom text-[10px] text-muted flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Sistemas Online
            </div>
        </aside>

        <!-- ÁREA CENTRAL (INFINITA) -->
        <main class="flex-1 flex flex-col relative overflow-hidden h-full">
            <div class="flex-1 overflow-y-auto pb-20 pt-6 px-4 scroll-smooth" id="scroll-area">
                <!-- Content Area sem h-full para permitir crescimento infinito -->
                <div class="max-w-3xl mx-auto w-full transition-all duration-500" id="content-area"></div>
                <p class="text-center text-[10px] text-muted mt-10 mb-4">Crônicas Estelares - Criado para a Comunidade de Criadores de Canais Dark.</p>
            </div>
        </main>
    </div>

    <script>
        const tools = [
            { id: 'divisor', title: 'Divisor de Texto', icon: 'M4 6h16M4 12h16m-7 6h7', url: 'https://divisordetexto.vercel.app', desc: 'Fragmentação de roteiros para IA.' },
            { id: 'srt', title: 'Conversor SRT', icon: 'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z', url: 'https://conversor-srt-topaz.vercel.app/', desc: 'Sincronização de legendas precisa.' },
            { id: 'silencio', title: 'Remover Silêncio', icon: 'M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z', url: 'https://removedor-silencio.vercel.app/', desc: 'Edição dinâmica de áudio automatizada.' },
            { id: 'gmail', title: 'Variador de Gmail', icon: 'M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z', url: 'https://variador-de-gmail.vercel.app/', desc: 'Múltiplas variações para o seu e-mail base.' }
        ];

        const extraPages = {
            'apoio': { title: 'Apoio ao Projeto', icon: 'M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z', url: 'https://page-doacao.vercel.app/', desc: 'Ajude-nos a evoluir a tecnologia.' },
            'protagonista': { title: 'Seja um Protagonista', icon: 'M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z', url: 'https://regras-cronicas-estelares.vercel.app', desc: 'Participa nas histórias do canal.' }
        };

        const body = document.body;
        const themeBtn = document.getElementById('theme-toggle');

        function applyTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'light') body.classList.add('light-theme');
            else body.classList.remove('light-theme');
        }

        themeBtn.onclick = () => {
            body.classList.toggle('light-theme');
            localStorage.setItem('theme', body.classList.contains('light-theme') ? 'light' : 'dark');
            broadcastTheme();
        };

        applyTheme();

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('mobile-overlay');
            if (window.innerWidth < 768) {
                sb.classList.toggle('active');
                ov.classList.toggle('active');
            } else {
                sb.classList.toggle('desktop-collapsed');
            }
        }

        function handleToolClick(event, id) {
            if (event.ctrlKey || event.button === 1) return;
            event.preventDefault();
            renderTool(id);
            if(window.innerWidth < 768) toggleSidebar();
        }

        const list = document.getElementById('tool-list');
        tools.forEach(t => {
            const a = document.createElement('a');
            a.href = t.url;
            a.className = 'w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover-surface text-sm text-muted hover:text-[var(--text-main)] transition-all';
            a.innerHTML = `<svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${t.icon}"></path></svg> <span class="truncate">${t.title}</span>`;
            a.onclick = (e) => handleToolClick(e, t.id);
            list.appendChild(a);
        });

        function renderHome() {
            const ca = document.getElementById('content-area');
            ca.className = 'max-w-3xl mx-auto w-full transition-all duration-300';
            ca.innerHTML = `
                <div class="mt-10 animate-fade-in text-center md:text-left">
                    <h1 class="text-2xl md:text-3xl font-bold title-gradient mb-4">Arsenal De Ferramentas.</h1>
                    <p class="text-muted mb-10 max-w-xl">Bem-vindo à Nave-Mãe Crônicas Estelares.</p>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        ${tools.map(t => `
                            <a href="${t.url}" onclick="handleToolClick(event, '${t.id}')" class="bg-surface hover-surface border border-custom p-6 rounded-2xl group transition-all duration-300 hover:-translate-y-1">
                                <div class="bg-[var(--bg-color)] w-12 h-12 rounded-full flex items-center justify-center mb-4 group-hover:text-accent transition-colors">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${t.icon}"></path></svg>
                                </div>
                                <h3 class="font-bold text-lg mb-2">${t.title}</h3>
                                <p class="text-xs text-muted leading-relaxed">${t.desc}</p>
                            </a>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderTool(id) {
            const t = tools.find(x => x.id === id) || extraPages[id];
            const ca = document.getElementById('content-area');
            // Removemos h-full do container interno para permitir expansão infinita
            ca.className = 'max-w-full md:px-4 mx-auto w-full transition-all';
            ca.innerHTML = `
                <div class="flex flex-col animate-fade-in">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-accent/10 flex items-center justify-center text-accent">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${t.icon}"></path></svg>
                            </div>
                            <h2 class="text-xl font-bold">${t.title}</h2>
                        </div>
                        <a href="${t.url}" target="_blank" class="p-2 rounded-full hover-surface text-muted" title="Abrir em Nova Aba">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                        </a>
                    </div>
                    <div class="bg-surface border border-custom rounded-3xl shadow-2xl relative">
                        <iframe id="tool-iframe" src="${t.url}" onload="syncIframeTheme(this)" class="w-full min-h-[75vh] border-none" scrolling="no"></iframe>
                    </div>
                </div>
            `;
            document.getElementById('scroll-area').scrollTo(0,0);
        }

        function syncIframeTheme(f) {
            if(f && f.contentWindow) {
                f.contentWindow.postMessage({ 
                    action: 'setTheme', 
                    theme: body.classList.contains('light-theme') ? 'light' : 'dark', 
                    isPortal: true 
                }, '*');
            }
        }

        function broadcastTheme() { document.querySelectorAll('iframe').forEach(syncIframeTheme); }

        // AJUSTE DE ALTURA DINÂMICO SEM LIMITAÇÃO
        window.addEventListener('message', (e) => {
            if (e.data?.action === 'resizeIframe' && e.data.height) {
                const f = document.getElementById('tool-iframe');
                if (f) {
                    // Define a altura exata enviada pelo Camaleão v9.0
                    f.style.height = e.data.height + 'px';
                }
            }
        });

        renderHome();
    </script>
</body>
</html>
